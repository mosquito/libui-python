name: Release

on:
  release:
    types: [published]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev pkg-config xvfb

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Remove Git link.exe conflicting with MSVC
        if: runner.os == 'Windows'
        shell: bash
        run: rm -f "/c/Program Files/Git/usr/bin/link.exe"

      - name: Apply patches to libui-ng
        run: python scripts/apply_patches.py

      - name: Install package
        run: pip install uv && uv sync --group dev

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: uv run xvfb-run pytest tests/ -v

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        timeout-minutes: 5
        run: uv run pytest tests/ -v

  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Set version
        run: sed -i.bak 's/^version = .*/version = "${{ steps.version.outputs.VERSION }}"/' pyproject.toml
        shell: bash

      - name: Apply patches to libui-ng
        run: python scripts/apply_patches.py

      - name: Compute cibuildwheel target
        if: runner.os == 'Linux'
        id: cibw
        run: echo "build=cp$(echo '${{ matrix.python-version }}' | tr -d .)-manylinux_x86_64" >> "$GITHUB_OUTPUT"

      - name: Build manylinux wheel
        if: runner.os == 'Linux'
        uses: pypa/cibuildwheel@v3.4
        with:
          output-dir: dist
        env:
          CIBW_BUILD: ${{ steps.cibw.outputs.build }}
          CIBW_ENABLE: cpython-prerelease
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: yum install -y gtk3-devel pkgconfig

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Remove Git link.exe conflicting with MSVC
        if: runner.os == 'Windows'
        shell: bash
        run: rm -f "/c/Program Files/Git/usr/bin/link.exe"

      - name: Build wheel (macOS/Windows)
        if: runner.os != 'Linux'
        run: pip install build && python -m build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version
        run: sed -i.bak 's/^version = .*/version = "${{ steps.version.outputs.VERSION }}"/' pyproject.toml

      - name: Apply patches to libui-ng
        run: python scripts/apply_patches.py

      - name: Build sdist
        run: pip install build && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload-release:
    if: always() && !cancelled()
    needs: [build-wheels, build-sdist, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-pypi:
    needs: [build-wheels, build-sdist, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
