name: Docs

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve LFS files
        run: |
          git lfs install --force
          git lfs fetch
          find . -name '*.png' -size -200c -delete
          git checkout -- '*.png'
          echo "=== source file check ==="
          file docs/tutorial/screenshots/*.png
          file docs/screenshots/*.png

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev pkg-config

      - name: Apply patches to libui-ng
        run: python scripts/apply_patches.py

      - name: Install package
        run: pip install uv && uv sync --group dev --group docs

      - name: Build docs
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: Debug build output
        run: |
          echo "=== _images contents ==="
          ls -la docs/_build/html/_images/ || true
          echo "=== file type check ==="
          file docs/_build/html/_images/*.png || true
          echo "=== full tree ==="
          find docs/_build/html -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
