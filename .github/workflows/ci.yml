name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install ruff

      - run: ruff format --check libui/ scripts/ tests/ examples/

      - run: ruff check libui/ scripts/ tests/ examples/

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev pkg-config xvfb

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install package
        run: pip install uv && uv pip install --system -Ue ".[dev]"

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: xvfb-run pytest tests/ -v

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        timeout-minutes: 5
        run: pytest tests/ -v
