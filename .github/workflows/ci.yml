name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install ruff

      - run: ruff format --check libui/ scripts/

      - run: ruff check libui/ scripts/

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev pkg-config

      - name: Build wheel
        run: pip install build && python -m build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/

      - name: Install wheel and test deps
        run: |
          pip install dist/*.whl
          pip install pytest pytest-asyncio
        shell: bash

      - name: Install Linux test dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk-3-0

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: xvfb-run pytest tests/ -v

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        timeout-minutes: 5
        run: pytest tests/ -v
