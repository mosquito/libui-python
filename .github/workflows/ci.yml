name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install ruff

      - run: ruff format --check libui/ scripts/ tests/ examples/

      - run: ruff check libui/ scripts/ tests/ examples/

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compute cibuildwheel target
        if: runner.os == 'Linux'
        id: cibw
        run: echo "build=cp$(echo '${{ matrix.python-version }}' | tr -d .)-manylinux_x86_64" >> "$GITHUB_OUTPUT"

      - name: Build manylinux wheel
        if: runner.os == 'Linux'
        uses: pypa/cibuildwheel@v2.22
        with:
          output-dir: dist
        env:
          CIBW_BUILD: ${{ steps.cibw.outputs.build }}
          CIBW_ENABLE: cpython-prerelease
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: yum install -y gtk3-devel pkgconfig

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheel (macOS/Windows)
        if: runner.os != 'Linux'
        run: pip install build && python -m build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/

      - name: Install wheel and test deps
        run: |
          pip install dist/*.whl
          pip install pytest pytest-asyncio
        shell: bash

      - name: Install Linux test dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb libgtk-3-0

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: xvfb-run pytest tests/ -v

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        timeout-minutes: 5
        run: pytest tests/ -v
